<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DebtApp - Login</title>
    <meta name="theme-color" content="#1d4ed8">
    <meta name="description" content="Debt management for shopkeepers and customers">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/assets/images/icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="fixed top-4 right-4 z-50">
        <button id="install-cta" class="flex items-center justify-center px-4 py-2 text-xs md:text-sm font-bold text-white bg-green-600 rounded-lg hover:bg-green-700 transition-all shadow-lg border-2 border-green-400/50">
            <svg class="w-4 h-4 md:w-5 md:h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            INSTALL APP
        </button>
    </div>

    <div class="bg-white border border-gray-200 w-full max-w-sm p-8 shadow-sm">
        <h1 class="text-2xl font-medium text-gray-900 text-center mb-8">DebtApp</h1>

        <div class="flex border border-gray-200 divide-x mb-6">
            <button id="role-shopkeeper" class="flex-1 py-2.5 text-sm font-medium bg-blue-600 text-white">Shopkeeper</button>
            <button id="role-customer"   class="flex-1 py-2.5 text-sm font-medium bg-gray-100 text-gray-600">Customer</button>
        </div>

        <h2 id="auth-title" class="text-xl font-medium text-gray-900 mb-6 text-center">Shopkeeper Login</h2>

        <form id="auth-form" class="space-y-5">
            <div>
                <label id="id-label" class="block text-sm text-gray-700 mb-1.5">Username</label>
                <input type="text" id="auth-id" class="w-full px-4 py-2 border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" required>
            </div>
            <div>
                <label class="block text-sm text-gray-700 mb-1.5">Password</label>
                <input type="password" id="auth-password" class="w-full px-4 py-2 border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" required>
            </div>
            <button type="submit" class="w-full py-2.5 bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
                Continue
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            <a href="#" id="toggle-auth" class="text-blue-600 hover:underline">Switch to Register</a>
        </p>
    </div>

    <script src="assets/js/auth2.js"></script>
  
</body>
</html>
