<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebtApp - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-64 bg-indigo-700 border-r border-indigo-600 transform -translate-x-full md:translate-x-0 transition-transform duration-200">
        <div class="flex flex-col h-full text-white">
            <div class="p-5 border-b border-indigo-600">
                <h1 class="text-xl font-semibold">DebtApp</h1>
            </div>
            <nav class="flex-1 px-3 py-5 space-y-1">
                <a href="dashboard.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-indigo-600/80 transition-colors sidebar-link" data-page="dashboard">Dashboard</a>
                <a href="shops.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-indigo-600/80 transition-colors sidebar-link shop-link" data-page="shops">Shops</a>
                <a href="debts.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-indigo-600/80 transition-colors sidebar-link debt-link" data-page="debts">Debts</a>
                <a href="profile.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-indigo-600/80 transition-colors sidebar-link" data-page="profile">Profile</a>
            </nav>
            <div class="p-4 border-t border-indigo-600 mt-auto">
                <button id="logout-btn" class="flex items-center w-full px-3 py-2.5 text-sm font-medium text-red-300 hover:bg-indigo-600/80 hover:text-white rounded-md transition-colors">Logout</button>
            </div>
        </div>
    </aside>

    <button id="sidebar-toggle" class="md:hidden fixed top-4 left-4 z-40 bg-white border border-gray-200 p-2 rounded hover:bg-gray-50">
        <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <main class="md:ml-64 p-6 mt-16 md:mt-0">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Account Settings</h2>
            
            <form id="profile-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username / Phone Number</label>
                    <input type="text" id="profile-name" class="w-full p-2.5 border rounded-lg bg-gray-50" readonly>
                    <p class="text-xs text-gray-400 mt-1">Username cannot be changed.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" id="profile-password" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Leave blank to keep current password">
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full md:w-auto px-6 py-2.5 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition-colors shadow-md">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </main>
    
    <script src="assets/js/common.js"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
