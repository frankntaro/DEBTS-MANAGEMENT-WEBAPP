<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebtApp - Debts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-64 bg-indigo-700 text-white transform -translate-x-full md:translate-x-0 transition-transform duration-200">
        <div class="p-5 border-b border-indigo-600"><h1 class="text-xl font-semibold">DebtApp</h1></div>
        <nav class="flex-1 px-3 py-5 space-y-1">
            <a href="dashboard.html" class="block px-3 py-2.5 rounded-md sidebar-link" data-page="dashboard">Dashboard</a>
            <a href="shops.html" class="block px-3 py-2.5 rounded-md sidebar-link shop-link" data-page="shops">Shops</a>
            <a href="debts.html" class="block px-3 py-2.5 rounded-md sidebar-link debt-link" data-page="debts">Debts</a>
            <a href="profile.html" class="block px-3 py-2.5 rounded-md sidebar-link" data-page="profile">Profile</a>
        </nav>
        <div class="p-4 border-t border-indigo-600 mt-auto">
            <button id="logout-btn" class="w-full text-left px-3 py-2 text-red-300 hover:text-white">Logout</button>
        </div>
    </aside>

    <button id="sidebar-toggle" class="md:hidden fixed top-4 left-4 z-40 bg-white border p-2 rounded">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <main class="md:ml-64 p-6 mt-16 md:mt-0">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Debts Management</h2>
            <button id="add-debt" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-indigo-700">+ Add New Debt</button>
        </div>
        
        <input type="text" id="debt-search" placeholder="Search by phone or name..." class="w-full p-3 border rounded-xl mb-6 shadow-sm outline-none focus:ring-2 focus:ring-indigo-500">
        
        <ul id="debts-list" class="space-y-4"></ul>
    </main>
    
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md">
            <h3 id="modal-title" class="text-xl font-bold mb-4">Record Debt</h3>
            <form id="modal-form" class="space-y-4">
                <div><label class="block text-sm font-medium">Shop</label><select id="debt-shop" class="w-full p-2 border rounded" required></select></div>
                <div><label class="block text-sm font-medium">Customer Phone</label><input type="tel" id="debt-phone" class="w-full p-2 border rounded" required></div>
                <div><label class="block text-sm font-medium">Customer Name</label><input type="text" id="debt-name" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-medium">Description</label><input type="text" id="debt-desc" class="w-full p-2 border rounded" required></div>
                <div><label class="block text-sm font-medium">Amount (TZS)</label><input type="number" id="debt-amount" class="w-full p-2 border rounded" required></div>
                <div><label class="block text-sm font-medium">Date</label><input type="date" id="debt-date" class="w-full p-2 border rounded" required></div>
                <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Save Record</button>
            </form>
            <button id="close-modal" class="mt-2 text-gray-500 w-full text-sm">Cancel</button>
        </div>
    </div>

    <div id="payment-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Deduct / Pay Debt</h3>
            <form id="payment-form" class="space-y-4">
                <div><label class="block text-sm font-medium">Amount Paid (TZS)</label><input type="number" id="payment-amount" class="w-full p-2 border rounded" required></div>
                <div><label class="block text-sm font-medium">Note</label><input type="text" id="payment-note" class="w-full p-2 border rounded" placeholder="Partial payment for sugar"></div>
                <button type="submit" class="w-full bg-emerald-600 text-white p-3 rounded-lg font-bold">Submit Payment</button>
            </form>
            <button id="close-payment" class="mt-2 text-gray-500 w-full text-sm">Cancel</button>
        </div>
    </div>

    <script src="assets/js/common.js"></script>
    <script src="assets/js/debts.js"></script>
</body>
</html>
