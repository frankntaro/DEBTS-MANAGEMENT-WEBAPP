<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebtApp - Dashboard</title>
    <meta name="theme-color" content="#1d4ed8">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-64 bg-indigo-700 border-r border-indigo-600 transform -translate-x-full md:translate-x-0 transition-transform duration-200">
        <div class="flex flex-col h-full text-white">
            <div class="p-5 border-b border-indigo-600">
                <h1 class="text-xl font-semibold">DebtApp</h1>
            </div>
            <nav class="flex-1 px-3 py-5 space-y-1">
                <a href="dashboard.html" class="block px-3 py-2.5 text-sm font-medium rounded-md bg-indigo-800 transition-colors">Dashboard</a>
                <a href="shops.html" class="block px-3 py-2.5 text-sm font-medium rounded-md hover:bg-indigo-600/80 transition-colors">Shops</a>
                <a href="debts.html" class="block px-3 py-2.5 text-sm font-medium rounded-md hover:bg-indigo-600/80 transition-colors">Debts</a>
                <a href="profile.html" class="block px-3 py-2.5 text-sm font-medium rounded-md hover:bg-indigo-600/80 transition-colors">Profile</a>
            </nav>
            <div class="p-4 border-t border-indigo-600 mt-auto">
                <button id="logout-btn" class="w-full text-left px-3 py-2.5 text-sm font-medium text-red-300 hover:text-white transition-colors">Logout</button>
            </div>
        </div>
    </aside>

    <button id="sidebar-toggle" class="md:hidden fixed top-4 left-4 z-40 bg-white border p-2 rounded shadow-md">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <main class="md:ml-64 p-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <h2 class="text-2xl font-bold text-gray-800">Shopkeeper Dashboard</h2>
            
            <button id="install-cta" class="hidden flex items-center justify-center px-6 py-2.5 text-sm font-bold text-white bg-green-600 rounded-lg hover:bg-green-700 transition-all shadow-lg border-2 border-green-400/50 w-full md:w-auto">
    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
    </svg>
    INSTALL APP
</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500 uppercase">Total Outstanding</h3>
                <p id="total-debt" class="text-3xl font-bold text-red-600 mt-2">0 TZS</p>
            </div>

            <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500 uppercase">Customers with Debt</h3>
                <p id="debt-customers" class="text-3xl font-bold text-indigo-700 mt-2">0</p>
            </div>

            <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500 uppercase mb-4">Recent Debts</h3>
                <ul id="recent-debts" class="divide-y divide-gray-100">
                    </ul>
            </div>
        </div>
    </main>

    <script src="assets/js/dashboard.js"></script>
</body>
</html>
